area_labels:
  area/ai:
    - "termstory/ai.py"
    - "termstory/ask.py"
    - "termstory/rag.py"
    - "termstory/predict.py"
    - "termstory/insights.py"
    - "termstory/hermes_obs.py"
    - "termstory/templates/**"
  area/storage:
    - "termstory/database.py"
    - "termstory/archive.py"
    - "termstory/backup.py"
    - "termstory/models.py"
    - "termstory/mcp_snapshot.py"
    - "termstory/exporter.py"
    - "termstory/git_integration.py"
    - "termstory/project.py"
  area/cli:
    - "termstory/cli.py"
    - "termstory/__main__.py"
    - "main.py"
    - "termstory/session.py"
    - "termstory/reminder.py"
  area/tui:
    - "termstory/tui.py"
    - "termstory/formatter.py"
    - "termstory/replay.py"
    - "termstory/notebook.py"
    - "termstory/stats.py"
    - "skills/**"
  area/search:
    - "termstory/search.py"
    - "termstory/tags.py"
    - "termstory/timeline.py"
    - "termstory/parser.py"
    - "termstory/sanitizer.py"
    - "termstory/date_utils.py"
    - "termstory/timestamp_detective.py"
  area/web:
    - "termstory/web.py"
  area/config:
    - "termstory/config.py"
    - "pyproject.toml"
    - "requirements.txt"
    - "setup.py"
    - "MANIFEST.in"
  kind/docs:
    - "docs/**"
    - "**/*.md"
    - "README*"
    - "CHANGELOG*"
    - "CONTRIBUTING*"
    - "DATA_PRIVACY*"
    - "SECURITY*"
  kind/ci:
    - ".github/**"
    - "scripts/**"
    - "*.sh"
  kind/tests:
    - "tests/**"
    - "tests/conftest.py"
    - "tests/fixtures/**"
    - "tests/stress/**"
    - "termstory/testing.py"

# Termstory uses the star-gate (authors must star the repo to use Miku commands).
star_gate: true

# Auto-assign the PR author when they open a PR.
pr_auto_assign: true

# ECSOC26 event support (disabled for termstory)
ecsoc26: True

# Duplicate issue detection (disabled by default; opt-in via .miku.yml)
duplicate_detection: true

